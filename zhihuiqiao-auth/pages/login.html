<body class="min-h-screen font-sans antialiased">
    <!-- ==================== 登录页面主体 ==================== -->
    <!-- 分屏布局：左侧品牌展示（50%）+ 右侧登录表单（50%），暗色主题 -->
    <main class="flex min-h-screen">

      <!-- ========== 左侧品牌展示面板 ========== -->
      <!-- 移动端隐藏，桌面端显示，全高背景图+品牌信息 -->
      <section class="hidden md:flex md:w-1/2 relative flex-col items-center justify-center overflow-hidden"
               style="background: url('../assets/auth-bg.jpg') center/cover no-repeat;">

        <!-- 深色遮罩渐变，确保文字可读性 -->
        <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(0,11,26,0.6) 0%, rgba(0,11,26,0.4) 100%);"></div>

        <!-- 品牌内容区域，居中排列 -->
        <div class="relative z-10 flex flex-col items-center px-8">

          <!-- CSS Logo：48x48px 圆角方形，主色蓝底+白色"桥"字 -->
          <div class="flex items-center justify-center rounded-lg shrink-0"
               style="width: 48px; height: 48px; background-color: #0055ff;">
            <span style="font-size: 24px; font-weight: 700; color: #ffffff; line-height: 1;">桥</span>
          </div>

          <!-- 品牌中文名 -->
          <h1 class="mt-4 whitespace-nowrap"
              style="font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: -0.02em;">
            智汇桥
          </h1>

          <!-- 品牌英文名 -->
          <p class="mt-1" style="font-size: 14px; color: #c9cdd4;">Zhihuiqiao</p>

          <!-- 装饰分隔线：主色蓝，宽度40px -->
          <div class="mt-5" style="width: 40px; height: 2px; background-color: #387bff;"></div>

          <!-- 品牌标语 -->
          <p class="mt-4 text-center leading-relaxed"
             style="font-size: 14px; color: #c9cdd4; max-width: 300px; line-height: 1.6;">
            AI 驱动的产学研用一体化智慧协同系统
          </p>
        </div>

        <!-- 底部功能亮点区域，三个小图标+文字 -->
        <div class="relative z-10 mt-16 flex flex-col gap-5 items-start" style="margin-left: 72px;">
          <!-- 亮点1：智能撮合 -->
          <div class="flex items-center gap-3">
            <!-- 闪光图标（内联SVG） -->
            <span class="flex items-center justify-center rounded-full shrink-0"
                  style="width: 28px; height: 28px; border: 1px solid rgba(56,123,255,0.4); background-color: rgba(56,123,255,0.08);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#387bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z"/>
              </svg>
            </span>
            <span style="font-size: 13px; color: #c9cdd4;">智能撮合</span>
          </div>

          <!-- 亮点2：资源共享 -->
          <div class="flex items-center gap-3">
            <!-- 层叠图标（内联SVG） -->
            <span class="flex items-center justify-center rounded-full shrink-0"
                  style="width: 28px; height: 28px; border: 1px solid rgba(56,123,255,0.4); background-color: rgba(56,123,255,0.08);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#387bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                <polyline points="2 17 12 22 22 17"/>
                <polyline points="2 12 12 17 22 12"/>
              </svg>
            </span>
            <span style="font-size: 13px; color: #c9cdd4;">资源共享</span>
          </div>

          <!-- 亮点3：个性教学 -->
          <div class="flex items-center gap-3">
            <!-- 书本图标（内联SVG） -->
            <span class="flex items-center justify-center rounded-full shrink-0"
                  style="width: 28px; height: 28px; border: 1px solid rgba(56,123,255,0.4); background-color: rgba(56,123,255,0.08);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#387bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
            </span>
            <span style="font-size: 13px; color: #c9cdd4;">个性教学</span>
          </div>
        </div>
      </section>

      <!-- ========== 右侧登录表单面板 ========== -->
      <!-- 深色背景，内容垂直水平居中 -->
      <section class="flex w-full md:w-1/2 items-center justify-center px-6 py-12"
               style="background-color: #0c0d0e;">

        <!-- 表单容器：最大宽度420px，内边距48px -->
        <div class="w-full" style="max-width: 420px; padding: 48px;">

          <!-- 移动端专属：小Logo + 品牌名（桌面端隐藏） -->
          <div class="flex md:hidden flex-col items-center mb-8">
            <div class="flex items-center justify-center rounded-lg shrink-0"
                 style="width: 40px; height: 40px; background-color: #0055ff;">
              <span style="font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1;">桥</span>
            </div>
            <span class="mt-2" style="font-size: 18px; font-weight: 600; color: #ffffff;">智汇桥</span>
          </div>

          <!-- ===== 表单头部 ===== -->
          <h2 style="font-size: 24px; font-weight: 700; color: #ffffff; word-break: keep-all; overflow-wrap: break-word; text-wrap: balance;">
            欢迎回来
          </h2>
          <p class="mt-2" style="font-size: 14px; color: #4e5969;">登录您的智汇桥账号</p>

          <!-- ===== Tab 切换器：账号登录 / 手机登录 ===== -->
          <div class="flex mt-8 gap-6" style="border-bottom: 1px solid #333333;">
            <!-- 账号登录Tab（当前激活） -->
            <button data-dom-id="tab-account"
                    class="pb-3 whitespace-nowrap transition-colors duration-150"
                    style="font-size: 14px; font-weight: 500; color: #387bff; border-bottom: 2px solid #387bff; margin-bottom: -1px; background: transparent; border-top: none; border-left: none; border-right: none; cursor: pointer;"
                    onmouseover="this.style.color='#1664ff'" onmouseout="if(!this.classList.contains('inactive'))this.style.color='#387bff'">
              账号登录
            </button>
            <!-- 手机登录Tab（未激活） -->
            <button data-dom-id="tab-phone"
                    class="inactive pb-3 whitespace-nowrap transition-colors duration-150"
                    style="font-size: 14px; font-weight: 500; color: #4e5969; border-bottom: 2px solid transparent; margin-bottom: -1px; background: transparent; border-top: none; border-left: none; border-right: none; cursor: pointer;"
                    onmouseover="this.style.color='#c9cdd4'" onmouseout="if(this.classList.contains('inactive'))this.style.color='#4e5969'">
              手机登录
            </button>
          </div>

          <!-- ===== 登录表单 ===== -->
          <form data-dom-id="login-form" class="flex flex-col mt-6" autocomplete="off">

            <!-- 用户名输入框 -->
            <div class="flex flex-col mt-5">
              <label class="mb-2" style="font-size: 13px; color: #c9cdd4;">账号</label>
              <div class="relative">
                <!-- 用户图标 -->
                <span class="absolute left-3 top-1/2 flex items-center justify-center"
                      style="transform: translateY(-50%); color: #4e5969;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                </span>
                <input type="text" name="username" placeholder="请输入用户名/邮箱"
                       class="w-full outline-none transition-all duration-150"
                       style="height: 44px; padding-left: 40px; padding-right: 16px; font-size: 14px; color: #ffffff; background-color: #1d2129; border: 1px solid #333333; border-radius: 8px;"
                       onfocus="this.style.borderColor='#387bff'; this.style.boxShadow='0 0 0 3px rgba(56,123,255,0.24)'"
                       onblur="this.style.borderColor='#333333'; this.style.boxShadow='none'"
                       aria-label="用户名">
              </div>
            </div>

            <!-- 密码输入框 -->
            <div class="flex flex-col mt-5">
              <label class="mb-2" style="font-size: 13px; color: #c9cdd4;">密码</label>
              <div class="relative">
                <!-- 锁图标 -->
                <span class="absolute left-3 top-1/2 flex items-center justify-center"
                      style="transform: translateY(-50%); color: #4e5969;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                </span>
                <input type="password" name="password" placeholder="请输入密码"
                       class="w-full outline-none transition-all duration-150"
                       style="height: 44px; padding-left: 40px; padding-right: 44px; font-size: 14px; color: #ffffff; background-color: #1d2129; border: 1px solid #333333; border-radius: 8px;"
                       onfocus="this.style.borderColor='#387bff'; this.style.boxShadow='0 0 0 3px rgba(56,123,255,0.24)'"
                       onblur="this.style.borderColor='#333333'; this.style.boxShadow='none'"
                       aria-label="密码">
                <!-- 显示/隐藏密码切换按钮 -->
                <button type="button" class="absolute right-3 top-1/2 flex items-center justify-center"
                        style="transform: translateY(-50%); color: #4e5969; background: transparent; border: none; cursor: pointer; padding: 4px;"
                        aria-label="显示密码"
                        onclick="const inp=this.parentElement.querySelector('input'); if(inp.type==='password'){inp.type='text';this.innerHTML='<svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94&quot;/><path d=&quot;M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19&quot;/><line x1=&quot;1&quot; y1=&quot;1&quot; x2=&quot;23&quot; y2=&quot;23&quot;/></svg>';this.setAttribute('aria-label','隐藏密码')}else{inp.type='password';this.innerHTML='<svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z&quot;/><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;/></svg>';this.setAttribute('aria-label','显示密码')}">
                  <!-- 眼睛图标（默认：可见状态） -->
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- 记住我 + 忘记密码 -->
            <div class="flex items-center justify-between mt-5">
              <!-- 记住我：自定义复选框 -->
              <label class="flex items-center gap-2 cursor-pointer" style="user-select: none;">
                <span class="relative flex items-center justify-center shrink-0"
                      style="width: 16px; height: 16px; border: 1px solid #333333; border-radius: 4px; background-color: #1d2129; transition: all 150ms;">
                  <!-- 自定义选中勾选标记（通过CSS隐藏原生checkbox） -->
                  <input type="checkbox" name="remember" class="absolute opacity-0" style="width: 16px; height: 16px; cursor: pointer;"
                         onchange="const b=this.parentElement; if(this.checked){b.style.backgroundColor='#0055ff'; b.style.borderColor='#0055ff'; b.innerHTML='<svg width=&quot;10&quot; height=&quot;10&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;#ffffff&quot; stroke-width=&quot;4&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><polyline points=&quot;20 6 9 17 4 12&quot;/></svg>'}else{b.style.backgroundColor='#1d2129'; b.style.borderColor='#333333'; b.innerHTML=''}">
                </span>
                <span style="font-size: 13px; color: #4e5969;">记住我</span>
              </label>
              <!-- 忘记密码链接 -->
              <a href="#" class="transition-colors duration-150 whitespace-nowrap"
                 style="font-size: 13px; color: #387bff; text-decoration: none;"
                 onmouseover="this.style.color='#1664ff'" onmouseout="this.style.color='#387bff'">
                忘记密码?
              </a>
            </div>

            <!-- 登录按钮 -->
            <button type="submit"
                    class="w-full flex items-center justify-center mt-6 whitespace-nowrap transition-all duration-150"
                    style="height: 44px; font-size: 14px; font-weight: 500; color: #ffffff; background-color: #0055ff; border: none; border-radius: 8px; cursor: pointer;"
                    onmouseover="this.style.backgroundColor='#1664ff'" onmouseout="this.style.backgroundColor='#0055ff'"
                    onmousedown="this.style.backgroundColor='#0055ff'" onmouseup="this.style.backgroundColor='#1664ff'">
              登录
            </button>

            <!-- 分隔线：或 -->
            <div class="flex items-center gap-3 mt-6">
              <div class="flex-1" style="height: 1px; background-color: #333333;"></div>
              <span style="font-size: 12px; color: #4e5969; white-space: nowrap;">或</span>
              <div class="flex-1" style="height: 1px; background-color: #333333;"></div>
            </div>

            <!-- 其他登录方式 -->
            <div class="flex flex-col items-center mt-5">
              <span style="font-size: 13px; color: #4e5969;">其他登录方式</span>
              <!-- 社交登录图标按钮行 -->
              <div class="flex items-center gap-4 mt-4">
                <!-- 微信图标按钮 -->
                <button type="button" class="flex items-center justify-center transition-all duration-150"
                        style="width: 40px; height: 40px; border-radius: 50%; background-color: #1d2129; border: 1px solid #333333; cursor: pointer;"
                        aria-label="微信登录"
                        onmouseover="this.style.backgroundColor='#2a3440'" onmouseout="this.style.backgroundColor='#1d2129'">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="#4e5969">
