    <style type="text/tailwindcss">
  @theme inline {
    --color-background: #000b1a;
    --color-foreground: #ffffff;
    --color-card: #1d2129;
    --color-primary: #0055ff;
    --color-muted: #1d2129;
    --color-muted-foreground: #4e5969;
    --color-accent: #387bff;
    --color-border: #333333;
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

</head>
<body class="min-h-screen font-sans antialiased">
    <main>
        <!-- 注册页面全屏居中布局，暗色主题 -->
        <!-- 背景：深色基底 #000b1a + 右上角蓝色微光 -->
        <div class="min-h-screen flex items-center justify-center px-4 py-8 relative" style="background: url('../assets/auth-bg.jpg') center/cover no-repeat;">

            <!-- 深色遮罩层，保持表单可读性 -->
            <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(0,11,26,0.88) 0%, rgba(0,11,26,0.75) 100%);"></div>

            <!-- 注册表单卡片：最大宽度 480px，垂直水平居中 -->
            <div data-dom-id="register-form" class="w-full max-w-[480px] rounded-2xl p-10 md:p-12 relative z-10" style="background: #1d2129; border: 1px solid #333333; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.3);">

                <!-- 表单头部：Logo + 标题 + 副标题 -->
                <div class="flex flex-col items-center text-center mb-8">
                    <!-- 小 Logo：40x40 圆角方块，蓝色底白字"桥" -->
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold text-lg mb-4" style="background: #0055ff;">
                        桥
                    </div>
                    <!-- 主标题 -->
                    <h1 class="text-[22px] font-bold text-white leading-tight mb-2" style="text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
                        创建智汇桥账号
                    </h1>
                    <!-- 副标题 -->
                    <p class="text-sm" style="color: #4e5969;">
                        填写以下信息完成注册
                    </p>
                </div>

                <!-- 步骤指示器（水平 3 步） -->
                <div data-dom-id="step-indicator" class="flex items-center justify-center mb-8">
                    <!-- 步骤 1：基本信息（激活态） -->
                    <div class="flex items-center">
                        <div class="flex flex-col items-center">
                            <div class="w-3 h-3 rounded-full" style="background: #387bff;"></div>
                            <span class="text-xs mt-1 whitespace-nowrap" style="color: #387bff;">基本信息</span>
                        </div>
                        <!-- 连接线（激活态蓝色） -->
                        <div class="w-12 h-[2px] mx-1" style="background: #387bff;"></div>
                    </div>
                    <!-- 步骤 2：身份验证（未激活） -->
                    <div class="flex items-center">
                        <div class="flex flex-col items-center">
                            <div class="w-3 h-3 rounded-full" style="background: #333333;"></div>
                            <span class="text-xs mt-1 whitespace-nowrap" style="color: #4e5969;">身份验证</span>
                        </div>
                        <!-- 连接线（未激活灰色） -->
                        <div class="w-12 h-[2px] mx-1" style="background: #333333;"></div>
                    </div>
                    <!-- 步骤 3：完成（未激活） -->
                    <div class="flex flex-col items-center">
                        <div class="w-3 h-3 rounded-full" style="background: #333333;"></div>
                        <span class="text-xs mt-1 whitespace-nowrap" style="color: #4e5969;">完成</span>
                    </div>
                </div>

                <!-- 注册表单字段区域 -->
                <form class="flex flex-col gap-5" onsubmit="return false;">

                    <!-- 第一行：用户名 + 邮箱（两列） -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- 用户名 -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-medium" style="color: #c9cdd4;">用户名</label>
                            <input
                                type="text"
                                placeholder="请输入用户名"
                                class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150"
                                style="background: #1d2129; border: 1px solid #333333;"
                                onfocus="this.style.borderColor='#387bff'"
                                onblur="this.style.borderColor='#333333'"
                            >
                        </div>
                        <!-- 邮箱 -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-medium" style="color: #c9cdd4;">邮箱</label>
                            <input
                                type="email"
                                placeholder="请输入邮箱地址"
                                class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150"
                                style="background: #1d2129; border: 1px solid #333333;"
                                onfocus="this.style.borderColor='#387bff'"
                                onblur="this.style.borderColor='#333333'"
                            >
                        </div>
                    </div>

                    <!-- 第二行：手机号 + 验证码（两列） -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- 手机号 -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-medium" style="color: #c9cdd4;">手机号</label>
                            <input
                                type="tel"
                                placeholder="请输入手机号"
                                class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150"
                                style="background: #1d2129; border: 1px solid #333333;"
                                onfocus="this.style.borderColor='#387bff'"
                                onblur="this.style.borderColor='#333333'"
                            >
                        </div>
                        <!-- 验证码 + 获取验证码按钮 -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-xs font-medium" style="color: #c9cdd4;">验证码</label>
                            <div class="flex gap-2">
                                <input
                                    type="text"
                                    placeholder="请输入验证码"
                                    class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150 flex-1 min-w-0"
                                    style="background: #1d2129; border: 1px solid #333333;"
                                    onfocus="this.style.borderColor='#387bff'"
                                    onblur="this.style.borderColor='#333333'"
                                >
                                <!-- 获取验证码按钮：描边样式 -->
                                <button
                                    type="button"
                                    class="h-11 w-[120px] shrink-0 rounded-lg text-xs font-medium transition-colors duration-150"
                                    style="border: 1px solid #387bff; color: #387bff; background: transparent;"
                                >
                                    获取验证码
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 第三行：密码（全宽） -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium" style="color: #c9cdd4;">密码</label>
                        <input
                            type="password"
                            placeholder="请设置密码 (至少8位)"
                            class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150"
                            style="background: #1d2129; border: 1px solid #333333;"
                            onfocus="this.style.borderColor='#387bff'"
                            onblur="this.style.borderColor='#333333'"
                        >
                        <!-- 密码强度指示条（3 段：红/黄/绿） -->
                        <div class="flex gap-1 mt-1">
                            <div class="h-1 flex-1 rounded-full" style="background: #333333;"></div>
                            <div class="h-1 flex-1 rounded-full" style="background: #333333;"></div>
                            <div class="h-1 flex-1 rounded-full" style="background: #333333;"></div>
                        </div>
                    </div>

                    <!-- 确认密码（全宽） -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium" style="color: #c9cdd4;">确认密码</label>
                        <input
                            type="password"
                            placeholder="请再次输入密码"
                            class="h-11 rounded-lg px-3 text-sm text-white placeholder:text-[#4e5969] outline-none transition-colors duration-150"
                            style="background: #1d2129; border: 1px solid #333333;"
                            onfocus="this.style.borderColor='#387bff'"
                            onblur="this.style.borderColor='#333333'"
                        >
                    </div>

                    <!-- 第四行：角色选择器 -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium" style="color: #c9cdd4;">选择身份</label>
                        <div class="flex flex-wrap gap-2" role="radiogroup" aria-label="选择身份">
                            <!-- 教师（选中态） -->
                            <button
                                type="button"
                                role="radio"
                                aria-checked="true"
                                class="h-9 px-4 rounded-lg text-sm font-medium transition-colors duration-150"
                                style="background: #0055ff; color: #ffffff;"
                            >
                                教师
                            </button>
                            <!-- 学生（未选中） -->
                            <button
                                type="button"
                                role="radio"
                                aria-checked="false"
                                class="h-9 px-4 rounded-lg text-sm font-medium transition-colors duration-150"
                                style="background: #2a3440; color: #c9cdd4;"
                            >
                                学生
                            </button>
                            <!-- 企业管理员（未选中） -->
                            <button
                                type="button"
                                role="radio"
                                aria-checked="false"
                                class="h-9 px-4 rounded-lg text-sm font-medium transition-colors duration-150"
                                style="background: #2a3440; color: #c9cdd4;"
                            >
                                企业管理员
                            </button>
                        </div>
                    </div>

                    <!-- 第五行：协议复选框 -->
                    <div class="flex items-start gap-2 mt-1">
                        <!-- 自定义蓝色复选框 -->
                        <div class="relative mt-0.5 shrink-0">
                            <input type="checkbox" id="agreement" class="peer sr-only" />
                            <label for="agreement" class="flex items-center justify-center w-4 h-4 rounded cursor-pointer transition-colors duration-150" style="border: 1px solid #4e5969; background: transparent;">
                                <!-- 选中图标（勾号） -->
                                <svg class="w-2.5 h-2.5 opacity-0 peer-checked:opacity-100 transition-opacity duration-150" viewBox="0 0 12 12" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="2,6 5,9 10,3"></polyline>
                                </svg>
                            </label>
                        </div>
                        <!-- 协议文本 -->
                        <span class="text-xs leading-relaxed" style="color: #c9cdd4;">
                            我已阅读并同意<a href="#" class="underline underline-offset-2 transition-colors duration-150" style="color: #387bff;">《用户协议》</a>和<a href="#" class="underline underline-offset-2 transition-colors duration-150" style="color: #387bff;">《隐私政策》</a>
                        </span>
                    </div>

                    <!-- 注册按钮（全宽） -->
                    <button
                        type="submit"
                        class="w-full h-11 rounded-lg text-sm font-medium text-white transition-colors duration-150 cursor-pointer"
                        style="background: #0055ff;"
                    >
                        注册
                    </button>

                    <!-- 底部：已有账号？立即登录 -->
                    <p class="text-center text-xs mt-2" style="color: #4e5969;">
                        已有账号？<a href="#" data-dom-id="goto-login" class="underline underline-offset-2 transition-colors duration-150" style="color: #387bff;">立即登录</a>
                    </p>

                </form>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
