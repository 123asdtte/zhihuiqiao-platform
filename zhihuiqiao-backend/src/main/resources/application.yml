server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: zhihuiqiao-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/zhihuiqiao?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

file:
  upload:
    path: uploads
  access:
    prefix: /uploads

  sql:
    init:
      # 数据库已初始化完成，改为 never 避免每次重启都重复插入数据
      mode: never
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhihuiqiao.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # HS512 算法要求密钥长度至少为 512 位（64 字节），使用环境变量注入，切勿硬编码
  secret: ${JWT_SECRET:zhihuiqiao-secret-key-for-jwt-signing-and-verification-2024}
  expiration: 86400000
  # Token 刷新窗口：过期前 30 分钟内允许刷新（毫秒）
  refresh-window: 1800000

# CORS 跨域配置
cors:
  # 允许的来源，多个用逗号分隔；生产环境务必替换为实际域名
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.zhihuiqiao: debug
    org.springframework.security: debug

# DeepSeek AI 配置
deepseek:
  # 请通过环境变量 DEEPSEEK_API_KEY 注入真实密钥，切勿提交到 Git
  api-key: ${DEEPSEEK_API_KEY:REPLACE_WITH_YOUR_DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  model: deepseek-chat
  max-tokens: 2000
  temperature: 0.7
